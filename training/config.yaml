# Darshana Fine-Tuning Configuration
# ===================================
# Default settings for LoRA fine-tuning of darshana specialist models.
# Override any value via CLI flags to finetune.py.

base_model: meta-llama/Llama-3.2-3B-Instruct

# Supported base models (tested):
#   - meta-llama/Llama-3.2-3B-Instruct   (~6 GB VRAM with 4-bit)
#   - meta-llama/Llama-3.2-8B-Instruct   (~10 GB VRAM with 4-bit)
#   - mistralai/Mistral-7B-Instruct-v0.3 (~10 GB VRAM with 4-bit)
#   - Qwen/Qwen2.5-7B-Instruct           (~10 GB VRAM with 4-bit)

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj

training:
  epochs: 3
  batch_size: 4
  learning_rate: 2.0e-4
  warmup_steps: 100
  max_length: 2048
  gradient_accumulation_steps: 4
  weight_decay: 0.01
  lr_scheduler: cosine
  fp16: true
  logging_steps: 10
  save_steps: 200
  eval_steps: 200

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: float16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

output_dir: training/adapters

# The six darshana names (used for data file lookup and adapter paths)
darshanas:
  - nyaya
  - samkhya
  - yoga
  - vedanta
  - mimamsa
  - vaisheshika

# Vritti reward model settings
vritti_reward:
  base_model: distilbert-base-uncased
  labels:
    - pramana
    - viparyaya
    - vikalpa
    - nidra
    - smriti
  learning_rate: 5.0e-5
  epochs: 5
  batch_size: 16
  max_length: 512
